name: fims_frontend
description: "Farmer Incentive Management System - Frontend"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  loading_animation_widget: ^1.3.0
  fluttertoast: ^8.2.10

  # Charts
  fl_chart: ^0.70.2

  # Excel & PDF
  excel: ^4.0.6
  pdf: ^3.11.3
  printing: ^5.14.2
  csv: ^6.0.0
  file_saver: ^0.2.14

  # Date & Formatting
  intl: ^0.19.0

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # File picker
  file_picker: ^8.1.7

  # Utilities
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/